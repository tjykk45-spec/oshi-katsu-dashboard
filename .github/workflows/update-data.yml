name: Update News Data & Deploy

on:
  schedule:
    # 毎朝6:00 JST (UTC 21:00 前日)
    - cron: '0 21 * * *'
  workflow_dispatch: {}  # 手動実行

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Fetch & summarize news
        run: npx tsx scripts/run.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash

      - name: Commit updated data
        run: |
          git config user.name "oshi-bot"
          git config user.email "actions@github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "chore: update news data $(date +'%Y-%m-%d')"
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # update ジョブがコミットした後の最新を取得
          fetch-depth: 0  # gh-pages ブランチを参照するため履歴全部必要

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Next.js static export
        run: npm run build

      # gh-pages ブランチに直接 push（Pagesは Settings で gh-pages から配信）
      - name: Deploy to gh-pages branch
        run: |
          touch out/.nojekyll
          npx gh-pages -d out -t -u "oshi-bot <actions@github.com>" -m "deploy: $(date +'%Y-%m-%d %H:%M')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
