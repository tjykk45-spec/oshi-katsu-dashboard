  <!-- 櫻坂46: ピンク（右） -->
  <polygon points="44,76 62,35 80,76" fill="#f472b6" opacity="0.85"/>
  <!-- 地平線 -->
  <rect x="12" y="74" width="76" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
